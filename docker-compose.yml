# =============================================================================
#  Face Recognition API – docker-compose.yml
#  Kullanimi: docker compose up --build
#  - PostgreSQL + pgvector  (veritabani)
#  - FastAPI + InsightFace   (api)
# =============================================================================

services:

  # ---------- PostgreSQL + pgvector ----------
  db:
    image: pgvector/pgvector:pg16
    container_name: face_recognition_db
    restart: unless-stopped

    # Baglanti bilgileri env ile disaridan verilebilir
    environment:
      POSTGRES_DB:     ${POSTGRES_DB:-face_db}
      POSTGRES_USER:   ${POSTGRES_USER:-face_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-face_password}

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    # Veri kaybolmasin diye volume tanimi
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # API container'i db hazir olmadan baslamasin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-face_user} -d ${POSTGRES_DB:-face_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- FastAPI + InsightFace ----------
  api:
    build: .
    container_name: face_recognition_api
    restart: unless-stopped

    ports:
      - "${API_PORT:-8000}:8000"

    # Tum ayarlar env degiskenlerinden gelir
    environment:
      DATABASE_URL:        ${DATABASE_URL:-postgresql://face_user:face_password@db:5432/face_db}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.45}
      MIN_DETECTION_CONFIDENCE: ${MIN_DETECTION_CONFIDENCE:-0.5}
      BLUR_THRESHOLD:      ${BLUR_THRESHOLD:-10.0}
      RATE_LIMIT:          ${RATE_LIMIT:-1000/minute}
      INSIGHTFACE_MODEL_NAME: ${INSIGHTFACE_MODEL_NAME:-buffalo_l}
      PORT:                ${API_PORT:-8000}

    depends_on:
      db:
        condition: service_healthy

    # Kırpılmış yüz fotoğrafları container yeniden başlayınca kaybolmasın
    volumes:
      # Geliştirme: kod değişiklikleri için rebuild gerektirmez
      - ./app:/app/app
      - ./fe:/app/fe
      - ./tests:/app/tests
      - ./requirements.txt:/app/requirements.txt
      - ./download_models.py:/app/download_models.py
      # Kalıcı veri: yüz fotoğrafları
      - images_data:/app/images

volumes:
  postgres_data:
  images_data:
